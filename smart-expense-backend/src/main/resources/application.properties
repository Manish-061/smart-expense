spring.application.name=smart-expense-backend

# ========================
# Server Configuration
# ========================
server.port=8080

# ========================
# PostgreSQL Configuration
# ========================
spring.datasource.url=jdbc:postgresql://localhost:5432/smart_expense
spring.datasource.username=postgres
spring.datasource.password=Manish@123
spring.datasource.driver-class-name=org.postgresql.Driver

# ========================
# JPA / Hibernate
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ========================
# JWT Configuration
# ========================
jwt.secret=5a2f8c9e4b7d1a3f6e0c8b2d5a7f9e1c4b6d8a0f2e4c6b8d0a2f4e6c8b0d2a
jwt.expiration=86400000

# ========================
# Redis Configuration (Phase 7)
# ========================
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Disable Redis auto-configuration until Phase 7
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
